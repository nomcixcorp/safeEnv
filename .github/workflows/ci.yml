name: CI

on:
  push:
    branches:
      - main
      - cursor/**
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/envSafe.Web/package-lock.json

      - name: Restore .NET
        run: dotnet restore envSafe.sln

      - name: Build API and tests
        run: dotnet build envSafe.sln --no-restore

      - name: Run backend tests
        run: dotnet test envSafe.sln --no-build

      - name: Install frontend dependencies
        working-directory: src/envSafe.Web
        run: npm ci

      - name: Build frontend
        working-directory: src/envSafe.Web
        run: npm run build
